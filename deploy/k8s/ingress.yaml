apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aegisgate
  namespace: aegisgate
  labels:
    app.kubernetes.io/name: aegisgate
    app.kubernetes.io/component: gateway
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - aegisgate.example.com
        - wss.aegisgate.example.com
      secretName: aegisgate-tls
  rules:
    - host: aegisgate.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aegisgate
                port:
                  number: 8443
    - host: wss.aegisgate.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aegisgate
                port:
                  number: 8443

---
# NetworkPolicy for additional security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aegisgate-network-policy
  namespace: aegisgate
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: aegisgate
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8443
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
