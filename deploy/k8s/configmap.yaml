apiVersion: v1
kind: ConfigMap
metadata:
  name: aegisgate-config
  namespace: aegisgate
  labels:
    app.kubernetes.io/name: aegisgate
    app.kubernetes.io/component: config
data:
  config.yaml: |
    server:
      host: 0.0.0.0
      port: 8443
      tls_port: 8443
      max_connections: 10000
      read_timeout: 30s
      write_timeout: 30s
    
    websocket:
      ping_interval: 30s
      pong_timeout: 60s
      max_message_size: 65536
      compression: true
    
    security:
      rate_limit: 100
      burst_limit: 1000
      tls_version: "1.3"
      cipher_suites:
        - TLS_AES_256_GCM_SHA384
        - TLS_CHACHA20_POLY1305_SHA256
      hsts_enabled: true
      hsts_max_age: 31536000
    
    logging:
      level: info
      format: json
      output: stdout
    
    metrics:
      enabled: true
      port: 8080
      path: /metrics
