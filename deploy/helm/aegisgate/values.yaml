# Default values for aegisgate.
# This file is checked into version control.

replicaCount: 3

image:
  repository: ghcr.io/aegisgatesecurity/aegisgate
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion
  tag: "v1.0.16"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  ports:
    http: 8080
    https: 8443
    metrics: 9090

ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  hosts:
    - host: aegisgate.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - aegisgate
          topologyKey: kubernetes.io/hostname

# Application configuration
config:
  logLevel: info
  complianceEnabled: true
  tier: community
