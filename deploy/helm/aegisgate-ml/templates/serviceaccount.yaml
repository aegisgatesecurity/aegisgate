{{- /*
ServiceAccount template - supports both global and direct serviceAccount values
*/ -}}
{{- $serviceAccount := .Values.serviceAccount | default .Values.global.serviceAccount | default dict -}}
{{- if $serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "aegisgate.serviceAccountName" . }}
  labels:
    {{- include "aegisgate.labels" . | nindent 4 }}
  {{- with $serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
