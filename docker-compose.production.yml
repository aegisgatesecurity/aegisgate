# AegisGate Production Docker Compose
# Security-Hardened Configuration
# SPDX-License-Identifier: MIT
# Copyright 2025-2026 AegisGate Security

version: '3.8'

services:
  aegisgate:
    image: ghcr.io/aegisgatesecurity/aegisgate:v1.0.14
    container_name: aegisgate
    build:
      context: .
      dockerfile: Dockerfile.production
    # ================================================================
    # SECURITY: Run as non-root (UID 65532)
    # ================================================================
    user: "65532:65532"
    
    # ================================================================
    # SECURITY: Read-only root filesystem with exceptions
    # ================================================================
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /var/log:size=32m,mode=1777
    
    # ================================================================
    # SECURITY: Resource limits prevent DoS
    # ================================================================
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # ================================================================
    # SECURITY: Drop all capabilities, add only what's needed
    # ================================================================
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # For binding to port 80/443 if needed
    
    # ================================================================
    # SECURITY: Network isolation
    # ================================================================
    networks:
      - aegisgate-internal
    
    # ================================================================
    # SECURITY: Hardened kernel parameters
    # ================================================================
    sysctls:
      - net.ipv4.ip_forward=0        # If not routing
      - net.ipv4.conf.all.rp_filter=1
      - net.ipv4.conf.default.rp_filter=1
    
    # ================================================================
    # SECURITY: seccomp profile
    # ================================================================
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined  # TODO: Use custom seccomp profile for production
    
    # ================================================================
    # STORAGE: Mounts for persistent/writable data
    # ================================================================
    volumes:
      # Configuration (read-only recommended)
      - ./config:/app/config:ro
      
      # Certificates (read-only recommended)
      - ./certs:/app/certs:ro
      
      # Writable: Audit logs
      - aegisgate-logs:/app/logs
      
      # Writable: Database/data
      - aegisgate-data:/app/data
    
    # ================================================================
    # ENVIRONMENT: Production settings
    # ================================================================
    environment:
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - COMPLIANCE_ENABLED=true
      - AEGISGATE_TIER=community
      # Security: Disable debugging
      - DEBUG=false
    
    # ================================================================
    # HEALTH: Verify service health
    # ================================================================
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # ================================================================
    # RESTART: Automatic restart with backoff
    # ================================================================
    restart: on-failure:5
    stop_grace_period: 30s
    
    # ================================================================
    # PORTS: Explicit (bind to localhost only)
    # ================================================================
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:8443:8443"
      - "127.0.0.1:8444:8444"

networks:
  aegisgate-internal:
    driver: bridge
    driver_opts:
      # Prevent container escape via IP routing
      com.docker.network.bridge.enable_ip_masquerade: "true"
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  aegisgate-logs:
    driver: local
  aegisgate-data:
    driver: local