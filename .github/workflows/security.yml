name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

env:
  GO_VERSION: '1.24'

jobs:
  govulncheck:
    name: Vulnerability Check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Run govulncheck
        id: govulncheck
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... 2>&1 | tee govulncheck-results.txt
      
      - name: Upload govulncheck results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: govulncheck-results
          path: govulncheck-results.txt
          retention-days: 7

  dependency-review:
    name: Dependency Review
    runs-on: self-hosted
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Check for vulnerable dependencies
        run: |
          go list -m -json all | Select-String -Pattern "Path|Version" | Out-File dependencies.txt
          Write-Host "Dependencies listed"
      
      - name: Upload dependency list
        uses: actions/upload-artifact@v4
        with:
          name: dependencies
          path: dependencies.txt
          retention-days: 7
