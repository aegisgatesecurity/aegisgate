name: DCO Check

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  dco-signed-off-check:
    runs-on: ubuntu-latest
    name: Verify Signed-off-by on all commits
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Get commit range
        id: commits
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            echo "range=${GITHUB_BASE_REF}...${GITHUB_HEAD_REF}" >> $GITHUB_OUTPUT
          else
            echo "range=${GITHUB_SHA}~1..${GITHUB_SHA}" >> $GITHUB_OUTPUT
          fi
          
      - name: Check for DCO sign-off
        run: |
          echo "Checking commits for DCO sign-off..."
          echo "Commit range: ${{ steps.commits.outputs.range }}"
          
          COMMITS=$(git log --format='%H' "${{ steps.commits.outputs.range }}" 2>/dev/null)
          
          if [ -z "$COMMITS" ]; then
            echo "No commits to check"
            exit 0
          fi
          
          FAILED=0
          CHECKED=0
          
          for commit_hash in $COMMITS; do
            CHECKED=$((CHECKED + 1))
            commit_short=$(echo "$commit_hash" | cut -c1-7)
            commit_msg=$(git log --format='%B' -1 "$commit_hash")
            
            if echo "$commit_msg" | grep -qi "Signed-off-by:"; then
              echo "✓ $commit_short has sign-off"
            else
              echo "✗ $commit_short MISSING sign-off"
              FAILED=$((FAILED + 1))
            fi
          done
          
          echo ""
          echo "Checked $CHECKED commits, $FAILED missing sign-off"
          
          if [ $FAILED -gt 0 ]; then
            echo "============================================"
            echo "ERROR: $FAILED commit(s) missing DCO sign-off"
            echo "============================================"
            echo ""
            echo "All commits MUST include:"
            echo "  Signed-off-by: Your Name <email@example.com>"
            echo ""
            echo "To fix, run locally:"
            echo "  git commit --amend --no-edit --signoff"
            echo "  git push --force-with-lease"
            exit 1
          fi
          
          echo "SUCCESS: All $CHECKED commits have DCO sign-off"