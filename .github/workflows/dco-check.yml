name: DCO Check

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  dco-signed-off-check:
    runs-on: ubuntu-latest
    name: Verify Signed-off-by on all commits
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Check for DCO sign-off
        run: |
          echo "Checking commits for DCO sign-off..."
          
          # Only check the commits introduced by this push/PR
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            COMMITS=$(git log --format='%H' "$GITHUB_BASE_REF".."$GITHUB_HEAD_REF")
          else
            # For push: only check the NEW commits (compare to parent of HEAD)
            COMMITS=$(git log --format='%H' HEAD~1..HEAD 2>/dev/null) || COMMITS=$(git rev-parse HEAD)
          fi
          
          FAILED=0
          for commit_hash in $COMMITS; do
            commit_message=$(git log --format='%B' -1 "$commit_hash")
            
            if echo "$commit_message" | grep -q "Signed-off-by:"; then
              commit_short=$(echo "$commit_hash" | cut -c1-7)
              echo "OK $commit_short has sign-off"
            else
              commit_short=$(echo "$commit_hash" | cut -c1-7)
              echo "FAIL $commit_short MISSING sign-off"
              FAILED=1
            fi
          done
          
          echo ""
          if [ $FAILED -eq 1 ]; then
            echo "============================================"
            echo "ERROR: Some commits are missing the Required DCO sign-off."
            echo "============================================"
            echo ""
            echo "All commits MUST include:"
            echo "  Signed-off-by: Your Name <your.email@example.com>"
            echo ""
            echo "To fix, run locally:"
            echo "  git commit --amend --no-edit --signoff"
            echo "  git push --force-with-lease"
            exit 1
          fi
          
          echo "SUCCESS: All commits have DCO sign-off"