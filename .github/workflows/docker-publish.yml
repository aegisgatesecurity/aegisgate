name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker tag to build'
        required: false
        default: 'latest'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push standard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ML-enabled image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            ML_ENABLED=true
          tags: |
            ghcr.io/${{ github.repository }}/ml:${{ github.ref_name == 'refs/heads/main' && 'latest' || github.ref_name }}
            ghcr.io/${{ github.repository }}/ml:${{ github.ref_name == 'refs/heads/main' && 'latest' || replace('refs/tags/v', '', github.ref_name) }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push minimal image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ultra-minimal
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/minimal:${{ github.ref_name == 'refs/heads/main' && 'latest' || github.ref_name }}
            ghcr.io/${{ github.repository }}/minimal:${{ github.ref_name == 'refs/heads/main' && 'latest' || replace('refs/tags/v', '', github.ref_name) }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image URLs
        run: |
          echo "Docker images pushed successfully:"
          echo "  ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
          echo "  ghcr.io/${{ github.repository }}/ml:${{ github.ref_name }}"
          echo "  ghcr.io/${{ github.repository }}/minimal:${{ github.ref_name }}"