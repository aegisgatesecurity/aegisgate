name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
      pull-requests: read
      attestations: write
      id-token: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: aegisgatesecurity/aegisgate
      GO_VERSION: 1.24

    outputs:
      version: ${{ steps.get_version.outputs.version }}
      sha: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver-opts: |
            image=moby/buildkit:v0.14.1
            network=host
          platforms: linux/amd64,linux/arm64,linux/arm
          version: v0.14.1

      - name: Build and push Docker image (with retry)
        id: build-docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
          continue-on-error: true

        - name: Fallback: Build without GHA cache
        if: steps.build-docker.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          provenance: false

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0.16.1
        id: syft

      - name: Generate SBOM
        run: |
          ${{ steps.syft.outputs.syft-path }} ./ -o cyclonedx-json=sb.cyclonedx.json
          ${{ steps.syft.outputs.syft-path }} ./ -o spdx-json=sb.spdx.json
          ${{ steps.syft.outputs.syft-path }} ./ -o table=sb.txt

      - name: Build Go binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o aegisgate-linux-amd64 ./cmd/aegisgate
          GOOS=linux GOARCH=arm64 go build -o aegisgate-linux-arm64 ./cmd/aegisgate
          GOOS=windows GOARCH=amd64 go build -o aegisgate-windows-amd64.exe ./cmd/aegisgate
          GOOS=darwin GOARCH=amd64 go build -o aegisgate-darwin-amd64 ./cmd/aegisgate
          GOOS=darwin GOARCH=arm64 go build -o aegisgate-darwin-arm64 ./cmd/aegisgate

      - name: Create release archive
        run: |
          tar -czf aegisgate-${{ steps.get_version.outputs.version }}-linux-amd64.tar.gz aegisgate-linux-amd64
          tar -czf aegisgate-${{ steps.get_version.outputs.version }}-linux-arm64.tar.gz aegisgate-linux-arm64
          zip aegisgate-${{ steps.get_version.outputs.version }}-windows-amd64.zip aegisgate-windows-amd64.exe
          tar -czf aegisgate-${{ steps.get_version.outputs.version }}-darwin-amd64.tar.gz aegisgate-darwin-amd64
          tar -czf aegisgate-${{ steps.get_version.outputs.version }}-darwin-arm64.tar.gz aegisgate-darwin-arm64

      - name: Attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: aegisgate-linux-amd64

      - name: Upload SBOMs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sb-files
          path: sb.*
          retention-days: 30

      - name: Upload binaries as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            aegisgate-${{ steps.get_version.outputs.version }}-linux-amd64.tar.gz
            aegisgate-${{ steps.get_version.outputs.version }}-linux-arm64.tar.gz
            aegisgate-${{ steps.get_version.outputs.version }}-windows-amd64.zip
            aegisgate-${{ steps.get_version.outputs.version }}-darwin-amd64.tar.gz
            aegisgate-${{ steps.get_version.outputs.version }}-darwin-arm64.tar.gz
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.get_version.outputs.version }}
          body: |
            ## AegisGate ${{ steps.get_version.outputs.version }}
            
            ### Changes
            - See CHANGELOG.md for details
            
            ### Installation
            Download the appropriate binary for your platform:
            - Linux (AMD64): aegisgate-${{ steps.get_version.outputs.version }}-linux-amd64.tar.gz
            - Linux (ARM64): aegisgate-${{ steps.get_version.outputs.version }}-linux-arm64.tar.gz
            - Windows (AMD64): aegisgate-${{ steps.get_version.outputs.version }}-windows-amd64.zip
            - macOS (AMD64): aegisgate-${{ steps.get_version.outputs.version }}-darwin-amd64.tar.gz
            - macOS (ARM64): aegisgate-${{ steps.get_version.outputs.version }}-darwin-arm64.tar.gz
            
            ### Container Image
            Pull the container image:
            ```bash
            docker pull ghcr.io/aegisgatesecurity/aegisgate:${{ steps.get_version.outputs.version }}
            ```
          files: |
            aegisgate-${{ steps.get_version.outputs.version }}-linux-amd64.tar.gz
            aegisgate-${{ steps.get_version.outputs.version }}-linux-arm64.tar.gz
            aegisgate-${{ steps.get_version.outputs.version }}-windows-amd64.zip
            aegisgate-${{ steps.get_version.outputs.version }}-darwin-amd64.tar.gz
            aegisgate-${{ steps.get_version.outputs.version }}-darwin-arm64.tar.gz
            sb.cyclonedx.json
            sb.spdx.json
            sb.txt
          generate_release_notes: false
          make_latest: true
          prerelease: ${{ contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
