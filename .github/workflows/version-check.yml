# version-check.yml - CI workflow to verify version consistency
name: Version Consistency Check

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from main.go
        id: version
        run: |
          VERSION=$(grep -o 'const version = "[^"]*"' cmd/aegisgate/main.go | grep -o '[0-9.]*')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION: $VERSION"

      - name: Verify VERSION matches git tag (if tagged)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          GIT_TAG=${GITHUB_REF#refs/tags/v}
          echo "Git tag: v$GIT_TAG"
          
          if [ "${{ steps.version.outputs.version }}" != "$GIT_TAG" ]; then
            echo "ERROR: Version in main.go does not match git tag!"
            echo "  main.go:     ${{ steps.version.outputs.version }}"
            echo "  Git tag:     v$GIT_TAG"
            exit 1
          fi
          echo "✓ Git tag matches main.go version"

      - name: Check go.mod Go version
        run: |
          GO_VERSION=$(grep '^go ' go.mod | awk '{print $2}')
          echo "go.mod Go version: $GO_VERSION"

      - name: Get git tags for verification
        run: |
          git fetch --tags origin main
          TAG_COUNT=$(git tag | wc -l)
          echo "Total tags: $TAG_COUNT"
