# CI - Main Continuous Integration Workflow
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

env:
  GO_VERSION: '1.24.0'

jobs:
  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check main.go version
        run: |
          VERSION=$(grep -o 'const version = "[^"]*"' cmd/aegisgate/main.go | grep -o '[0-9.]*')
          echo "Version: $VERSION"
          if [ -z "$VERSION" ]; then
            echo "VERSION not found in main.go"
            exit 1

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Download dependencies
        run: go mod download
      - name: Run tests
        run: go test -v -coverprofile=coverage.out -skip TestHTTP3 ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, version-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build
        run: go build -v -o aegisgate ./cmd/aegisgate

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install gosec
        run: curl -sSL https://github.com/securego/gosec/releases/download/v2.23.0/gosec_2.23.0_linux_amd64.tar.gz | tar -xz
      - name: Run gosec
        run: ./gosec -no-fail -fmt sarif -out gosec.sarif ./...
      - name: Upload SARIF
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gosec-results
          path: gosec.sarif

  # ============================================================================
  # DAST (Dynamic Application Security Testing) - OWASP ZAP
  # ============================================================================
  dast-scan:
    name: DAST Security Scan (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      
      - name: Build application
        run: go build -o aegisgate ./cmd/aegisgate
      
      - name: Start application in background
        run: |
          chmod +x aegisgate
          ./aegisgate --port 8080 &
          echo $! > aegisgate.pid
          sleep 15
      
      - name: Check server is running
        run: curl -f http://localhost:8080/health || (cat aegisgate.log && exit 1)
      
      - name: Run OWASP ZAP Spider Scan
        run: |
          docker run --network host -u root -v ${{ github.workspace }}:/zap/wrk:rw owasp/zap2docker-stable zap-baseline.py -t http://localhost:8080 -r zap-spider-report.html -l PASS || true
        continue-on-error: true
      
      - name: Run OWASP ZAP Active Scan
        run: |
          docker run --network host -u root -v ${{ github.workspace }}:/zap/wrk:rw owasp/zap2docker-stable zap-full-scan.py -t http://localhost:8080 -r zap-full-report.html -l FAIL || true
        continue-on-error: true
      
      - name: Upload ZAP Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-reports
          path: zap-*.html
          retention-days: 30
      
      - name: Stop test server
        if: always()
        run: |
          if [ -f aegisgate.pid ]; then
            kill $(cat aegisgate.pid) 2>/dev/null || true
          fi

  # ============================================================================
  # Dependency Vulnerability Scanning (Trivy)
  # ============================================================================
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      
      - name: Download Go modules
        run: go mod download
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true
      
      - name: Upload Trivy Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif
          retention-days: 30