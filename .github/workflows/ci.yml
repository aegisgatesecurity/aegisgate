# CI - Main Continuous Integration Workflow
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  GO_VERSION: '1.24.0'

jobs:
  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check main.go version
        run: |
          VERSION=$(grep -o 'const version = "[^"]*"' cmd/aegisgate/main.go | grep -o '[0-9.]*')
          echo "Version: $VERSION"
          if [ -z "$VERSION" ]; then
            echo "VERSION not found in main.go"
            exit 1
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Download dependencies
        run: go mod download
      - name: Run tests
        run: go test -v -coverprofile=coverage.out -skip TestHTTP3 ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, version-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build
        run: go build -v -o aegisgate ./cmd/aegisgate

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install gosec
        run: curl -sSL https://github.com/securego/gosec/releases/download/v2.23.0/gosec_2.23.0_linux_amd64.tar.gz | tar -xz
      - name: Run gosec
        run: ./gosec -no-fail -fmt sarif -out gosec.sarif ./...
      - name: Upload SARIF
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gosec-results
          path: gosec.sarif

  # ============================================================================
  # DAST (Dynamic Application Security Testing) - OWASP ZAP
  # ============================================================================
  dast-scan:
    name: DAST Security Scan (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: [build, test]
    timeout-minutes: 30
    container: owasp/zap2docker-stable:latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build and start test server
        run: |
          go build -o aegisgate .
          nohup ./aegisgate serve --port 8080 &
          sleep 10
          curl -f http://localhost:8080/health || exit 1
      
      - name: Run OWASP ZAP Spider Scan
        run: |
          python /zap/zap-baseline.py -t http://host.docker.internal:8080 -r zap-spider-report.html -l PASS || true
      
      - name: Run OWASP ZAP Active Scan
        run: |
          python /zap/zap-full-scan.py -t http://host.docker.internal:8080 -r zap-full-report.html -l FAIL || true
        continue-on-error: true
      
      - name: Upload ZAP Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-reports
          path: zap-*.html
          retention-days: 30
      
      - name: Stop test server
        if: always()
        run: pkill -f aegisgate || true

  # ============================================================================
  # Dependency Vulnerability Scanning (Trivy)
  # ============================================================================
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

