name: Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  release-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Build release binaries
        run: |
          mkdir -p releases
          GOOS=windows GOARCH=amd64 go build -o releases/aegisgate-windows-amd64.exe ./cmd/aegisgate
          GOOS=linux GOARCH=amd64 go build -o releases/aegisgate-linux-amd64 ./cmd/aegisgate
          GOOS=darwin GOARCH=amd64 go build -o releases/aegisgate-darwin-amd64 ./cmd/aegisgate
      
      - name: Generate SBOM for release
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft dir . -o cyclonedx-json > releases/sbom.json
      
      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            releases/aegisgate-windows-amd64.exe
            releases/aegisgate-linux-amd64
            releases/aegisgate-darwin-amd64
            releases/sbom.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
