# AegisGate Tier Configuration
# Auto-generated by admin panel integration
# This file is used when the admin panel is not available

[tiers]
# Tier 0: Community (Free)
community = { max_servers = 1, max_users = 3, rate_limit = 60 }

# Tier 1: Developer
developer = { max_servers = 5, max_users = 10, rate_limit = 600 }

# Tier 2: Professional
professional = { max_servers = 25, max_users = 50, rate_limit = 3000 }

# Tier 3: Enterprise (Custom)
enterprise = { max_servers = -1, max_users = -1, rate_limit = -1 }

[validation]
# Admin panel URL for license validation
admin_panel_url = "http://localhost:8443"

# License key (set via LICENSE_KEY environment variable)
# license_key = ""

# Fail open if license service unavailable (default: false for security)
# Setting to false will block requests if license service is down
# SECURITY: Do not change to true without authorization
fail_open = false
