# Padlock Minimal ML Configuration
# ===============================
# Quick-start configuration for testing ML anomaly detection

server:
  bind_address: ":8443"
  upstream: "http://localhost:8080"

ml:
  enabled: true
  sensitivity: "medium"
  block_on_critical: true
  sample_rate: 100

ml_advanced:
  enable_prompt_injection: true
  enable_content_analysis: true
  enable_behavioral_analysis: true

compliance:
  atlas:
    enabled: true

logging:
  level: "info"
  json: true
