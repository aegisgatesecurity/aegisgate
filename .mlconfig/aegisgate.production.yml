# Padlock Production ML Configuration
# ==================================
# Optimized for high-security production environments

server:
  bind_address: ":8443"
  upstream: "https://your-ai-backend.com"
  timeout: 30s
  max_body_size: 52428800  # 50MB for LLM contexts

rate_limit:
  requests_per_minute: 500
  burst: 50

tls:
  provider: "letsencrypt"
  acme:
    email: "security@example.com"
    domains:
      - "padlock.yourdomain.com"

ml:
  enabled: true
  sensitivity: "high"  # More aggressive detection
  block_on_critical: true
  block_on_high: true   # Block high severity in production
  min_score_to_block: 2.5
  sample_rate: 100      # Analyze all traffic
  log_all_anomalies: true

ml_advanced:
  enable_prompt_injection: true
  prompt_injection_sensitivity: 80
  enable_content_analysis: true
  enable_behavioral_analysis: true
  window_size: 5000     # Larger window for better baseline
  z_threshold: 2.5       # Lower threshold = more sensitive

prompt_injection:
  custom_patterns:
    - name: "corporate_confidential"
      pattern: "(?i)(q[1-4]\\s*results?|earnings|merger|acquisition|material_nonpublic)"
      severity: 5
    - name: "executive_override"
      pattern: "(?i)(ceo|cfo|cto)\\s*(said|asked|told)"
      severity: 4

compliance:
  atlas:
    enabled: true
    block_critical: true
  hipaa:
    enabled: true
    module: "premium"
  pci:
    enabled: true
    module: "premium"
  soc2:
    enabled: true
  nist:
    enabled: true

siem:
  enabled: true
  format: "splunk"
  endpoint: "${SPLUNK_ENDPOINT}"
  api_key: "${SPLUNK_KEY}"

security:
  enable_fips: true
  enable_audit_logging: true
  enable_opsec: true
  enable_immutable_config: true
  enable_wal: true
  enable_snapshot: true

observability:
  metrics:
    enabled: true
    port: 9090
  health:
    enabled: true
    port: 8080
